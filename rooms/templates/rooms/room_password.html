{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/room_form.css' %}">
{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-header">
            <div class="form-icon">🔒</div>
            <h2>비밀번호 입력</h2>
            <p>이 방은 비밀번호가 필요합니다.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>방 비밀번호</label>
                {{ form.password }}
            </div>

            <button class="btn btn-primary w-100 rounded-pill form-submit">
                입장하기
            </button>

            <a href="{% url 'room_list' %}" class="btn btn-light w-100 rounded-pill mt-2">
                방 목록으로 돌아가기
            </a>
        </form>
    </div>
</div>
{% endblock %}
