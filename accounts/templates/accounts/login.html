{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card room-card">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-3">로그인</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 rounded-pill">로그인</button>
                </form>

                <hr>
                <a href="{% url 'signup' %}" class="btn btn-outline-dark w-100 rounded-pill">
                    회원가입
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
