{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/account_form.css' %}">
{% endblock %}

{% block content %}
<div class="account-page">
    <div class="account-card">
        <div class="account-header">
            <div class="account-icon">🔐</div>
            <h2>로그인</h2>
            <p>Walkie Talkie에 다시 오신 걸 환영합니다.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="account-field">
                <label for="{{ form.username.id_for_label }}">아이디</label>
                {{ form.username }}
            </div>

            <div class="account-field">
                <label for="{{ form.password.id_for_label }}">비밀번호</label>
                {{ form.password }}
            </div>

            {% if form.errors %}
                <div class="account-error">
                    아이디 또는 비밀번호를 확인해 주세요.
                </div>
            {% endif %}

            <button class="btn btn-primary w-100 rounded-pill account-submit">
                로그인
            </button>

            <a href="{% url 'signup' %}" class="btn btn-light w-100 rounded-pill mt-2">
                회원가입
            </a>
        </form>
    </div>
</div>
{% endblock %}
