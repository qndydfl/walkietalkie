{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card room-card">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-3">회원가입</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success w-100 rounded-pill">가입하기</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
